<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New entry</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="header-text">The Digital Vellum</div>
        <nav>
            <ul>
                <li><a href="vault.html" class="nav-link">Archive</a></li>
                <li><a href="#" class="nav-link">New Entry</a></li>
                <li>
                    <a href="index.html" class="project-icon">
                        <svg xmlns="http://w3.org" 
                             viewBox="0 0 24 24" 
                             width="30" height="30" 
                             fill="none" stroke="currentColor" 
                             stroke-width="2" stroke-linecap="round" 
                             stroke-linejoin="round">
                            <!-- Outer Frame Circle -->
                            <circle cx="12" cy="12" r="10" />
  
                            <!-- Head -->
                            <circle cx="12" cy="11" r="3" />
  
                            <!-- Shoulders / Torso inside the frame -->
                            <path d="M7 19.5a5 5 0 0 1 10 0" />
                        </svg>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <section class="input-container">
        <div class="thought-column">
            <div class="blank"></div>
            <div class="thought-input">DEPTH INSIGHT</div>
            <div class="thought-input">While without judgement the vellum remebers only what you choose to ink</div>
        </div>
        
        <div>
            <form id="input-form" class="input-form">

                <div class="entry-title-container">
                    <h2 id="display-date"></h2>
                                       
                    <input id="entry-title" 
                        name="entry-title" 
                        class="entry-title" 
                        type="text" 
                        required 
                        placeholder="Untitled Reflection">
                </div>

                <div class="mood-container">
                    <button type="button" 
                            id="entry-tag-btn" 
                            class="btn">
                            Add Mood
                    </button>

                    <!--Dynamic moods created here-->

                </div>
                
                <input id="entry-date" 
                    name="entry-date" 
                    class="entry-date" 
                    type="date" 
                    required>
                
                
                
                <textarea id="entry-text" 
                        name="entry-text" 
                        class="entry-text"
                        required 
                        placeholder="Begin your reflection..."></textarea>

                <div class="btn-container">
                    <button type="button" class="btn-1">Discard</button>
                    <button type="submit" class="btn">Save Entry</button>
                </div>

            </form>
        </div>

    </section>

    <dialog id="mood-dialog">
            <h3>Select a Mood:</h3>
            <button type="button" class="mood-option" data-mood="Happy">Happy 😊</button>
            <button type="button" class="mood-option" data-mood="Sad">Sad 😢</button>
            <button type="button" class="mood-option" data-mood="Anxious">Anxious 😰</button>
            <br><br>
            <button type="button" id="close-dialog">Close</button>
    </dialog>

     <footer>
        <div>&copy; 2026 My ITOL Vault. Designed for reflection </div>
    </footer>
    <script src="./app.js"></script>
    <script src="entry.js"></script>
    
    
</body>
</html>
